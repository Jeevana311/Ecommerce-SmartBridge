{% extends 'store/base.html' %}



{% block title %}
Checkout
{% endblock %}




{% block content %}




<div class="auth-container">



<h1>
    Checkout
</h1>





<form method="POST">


{% csrf_token %}






<div class="form-group">


<label>
    Full Name
</label>


<input
    type="text"
    name="full_name"
    placeholder="Enter your full name"
    required
>


</div>







<div class="form-group">


<label>
    Email
</label>


<input
    type="email"
    name="email"
    placeholder="Enter your email"
    required
>


</div>







<div class="form-group">


<label>
    Phone Number
</label>


<input
    type="text"
    name="phone"
    placeholder="Enter phone number"
    required
>


</div>







<div class="form-group">


<label>
    Delivery Address
</label>


<textarea
    name="address"
    rows="5"
    placeholder="Enter your address"
    required
></textarea>


</div>








<button type="submit">

    Place Order

</button>






</form>





</div>





{% endblock %}
