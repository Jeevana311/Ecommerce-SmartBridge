{% extends 'store/base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-container">

    <h1>Create Account</h1>

    {% if messages %}
        {% for message in messages %}
            <p class="message">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="{% url 'login' %}">
            Login
        </a>
    </p>

</div>

{% endblock %}
