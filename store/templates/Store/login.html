{% extends 'store/base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-container">

    <h1>Login</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter your username"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
            >

            <div class="show-password">
                <input
                    type="checkbox"
                    onclick="showPassword()"
                >

                Show Password
            </div>
        </div>

        <div class="forgot-password">
            <a href="#">
                Forgot Password?
            </a>
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <hr>

    <p>
        Don't have an account?
        <a href="{% url 'register' %}">
            Register
        </a>
    </p>

</div>

<script>

function showPassword(){

    var x = document.getElementById("password");

    if(x.type === "password"){

        x.type = "text";

    }

    else{

        x.type = "password";

    }

}

</script>

{% endblock %}
